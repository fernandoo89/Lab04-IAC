<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Processor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 0.9em;
        }

        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-zone:hover {
            background: #eef1ff;
            border-color: #764ba2;
        }

        .upload-zone.dragover {
            background: #e0e7ff;
            border-color: #4c51bf;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .file-input {
            display: none;
        }

        .upload-text {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.85em;
        }

        .preview-container {
            margin-top: 20px;
            display: none;
        }

        .preview-img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }

        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .config-section {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .config-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .config-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .config-input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📸 Image Processor</h1>
        <p class="subtitle">Sube una imagen y será procesada en segundo plano</p>

        <div class="config-section">
            <div class="config-label">API Gateway Endpoint:</div>
            <input type="text" id="apiEndpoint" class="config-input"
                placeholder="https://xxxxxxx.execute-api.us-east-2.amazonaws.com">
        </div>

        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">☁️</div>
            <div class="upload-text">Haz clic o arrastra una imagen aquí</div>
            <div class="upload-hint">JPG, PNG, GIF, WEBP (Máx. 10MB)</div>
            <input type="file" id="fileInput" class="file-input" accept="image/*">
        </div>

        <div class="preview-container" id="previewContainer">
            <img id="previewImg" class="preview-img" alt="Preview">
            <button class="btn" id="uploadBtn" onclick="uploadImage()">
                Subir Imagen
            </button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Procesando imagen...</div>
        </div>

        <div class="result" id="result"></div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');
        const previewImg = document.getElementById('previewImg');
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const apiEndpointInput = document.getElementById('apiEndpoint');

        let selectedFile = null;

        // Load saved endpoint from localStorage
        const savedEndpoint = localStorage.getItem('apiEndpoint');
        if (savedEndpoint) {
            apiEndpointInput.value = savedEndpoint;
        }

        // Save endpoint on change
        apiEndpointInput.addEventListener('change', () => {
            localStorage.setItem('apiEndpoint', apiEndpointInput.value);
        });

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showResult('error', 'Por favor selecciona una imagen válida');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showResult('error', 'La imagen debe ser menor a 10MB');
                return;
            }

            selectedFile = file;

            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                previewContainer.style.display = 'block';
                result.style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        async function uploadImage() {
            const apiEndpoint = apiEndpointInput.value.trim();

            if (!apiEndpoint) {
                showResult('error', 'Por favor ingresa el API Gateway Endpoint');
                return;
            }

            if (!selectedFile) {
                showResult('error', 'Por favor selecciona una imagen primero');
                return;
            }

            uploadBtn.disabled = true;
            loading.style.display = 'block';
            result.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('image', selectedFile);

                const response = await fetch(`${apiEndpoint}/upload`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    showResult('success',
                        `✅ Imagen subida exitosamente!<br>` +
                        `<strong>Archivo:</strong> ${selectedFile.name}<br>` +
                        `<strong>Tamaño:</strong> ${(selectedFile.size / 1024).toFixed(2)} KB<br>` +
                        `<strong>S3 Key:</strong> ${data.files[0].s3Key}<br><br>` +
                        `La imagen será procesada en segundo plano y estará disponible en la carpeta 'processed/' en unos segundos.`
                    );
                } else {
                    showResult('error', `Error: ${data.error || 'Error desconocido'}`);
                }
            } catch (error) {
                showResult('error', `Error de conexión: ${error.message}`);
            } finally {
                uploadBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function showResult(type, message) {
            result.className = `result ${type}`;
            result.innerHTML = message;
            result.style.display = 'block';
        }
    </script>
</body>

</html>
